[build]
  publish = "."
  # No build command — pure static HTML/CSS/JS

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache JS and CSS aggressively; browsers will bust on filename change
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA — serve index.html for all routes (future-proofing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
